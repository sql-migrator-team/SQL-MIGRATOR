<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Migrator - Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#1e3a8a);
        }

        .login-container{
            width:400px;
            background:#fff;
            padding:40px;
            border-radius:20px;
            box-shadow:0 15px 35px rgba(0,0,0,0.3);
        }

        .logo{
            text-align:center;
            margin-bottom:25px;
        }

        .logo h1{
            color:#1e3a8a;
            font-size:32px;
        }

        .logo p{
            color:#666;
            margin-top:5px;
            font-size:14px;
        }

        .form-group{
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:600;
            color:#333;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:15px;
        }

        input:focus{
            outline:none;
            border-color:#1e3a8a;
        }

        .options{
            display:flex;
            justify-content:space-between;
            margin-bottom:20px;
            font-size:14px;
        }

        .options a{
            text-decoration:none;
            color:#1e3a8a;
        }

        .login-btn{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#1e3a8a;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        .login-btn:hover{
            background:#2563eb;
        }

        .signup{
            text-align:center;
            margin-top:20px;
            color:#555;
        }

        .signup a{
            text-decoration:none;
            color:#1e3a8a;
            font-weight:bold;
        }
    </style>
</head>
<body>

    <div class="login-container">

        <div class="logo">
            <h1>SQL Migrator</h1>
            <p>Database Migration & ETL Platform</p>
        </div>

        <form>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Enter your password">
            </div>

            <div class="options">
                <label>
                    <input type="checkbox"> Remember Me
                </label>
                <a href="#">Forgot Password?</a>
            </div>

            <button type="submit" class="login-btn">
                Login
            </button>

            <div class="signup">
                Don't have an account?
                <a href="#">Register</a>
            </div>
        </form>

    </div>

</body>
</html>

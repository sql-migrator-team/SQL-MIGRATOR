<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SQL Migrator - Login</title>
  <!-- Link to external CSS -->
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="login-container">
    <h2>SQL Migrator Login</h2>
    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username / Email</label>
        <input type="text" id="username" name="username" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <div id="loginMessage" class="login-message"></div>
      <button type="submit" class="login-btn">Login</button>
    </form>
    <div class="extra-links">
      <a href="#">Forgot Password?</a> | <a href="reg.html">Register</a>
    </div>
  </div>
  <script>
    const loginForm = document.getElementById('loginForm');
    const loginMessage = document.getElementById('loginMessage');

    loginForm.addEventListener('submit', async (event) => {
      event.preventDefault();

      const formData = new FormData(loginForm);
      const payload = new URLSearchParams();
      formData.forEach((value, key) => payload.append(key, value));

      try {
        const response = await fetch('/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
          },
          body: payload
        });

        if (response.ok) {
          window.location.href = '/static/dashboard.html';
          return;
        }

        const result = await response.json();
        loginMessage.textContent = result.detail || 'Login failed. Please try again.';
        loginMessage.style.color = 'red';
      } catch (error) {
        loginMessage.textContent = 'Unable to connect to the backend.';
        loginMessage.style.color = 'red';
      }
    });
  </script>
</body>
</html>

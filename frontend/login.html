<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SQL Migrator - Login</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #ffffff;
      color: #333333;
    }

    .login-container {
      max-width: 380px;
      margin: 80px auto;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.12);
      background-color: #ffffff;
    }

    .login-container h2 {
      margin-bottom: 24px;
      text-align: center;
      color: #1f3a93;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
      box-sizing: border-box;
    }

    .login-btn {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      background-color: #1d4ed8;
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .login-btn:hover {
      background-color: #2563eb;
    }

    .extra-links {
      margin-top: 18px;
      text-align: center;
      font-size: 14px;
    }

    .extra-links a {
      color: #1d4ed8;
      text-decoration: none;
    }

    .login-message {
      margin-bottom: 16px;
      min-height: 20px;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>SQL Migrator Login</h2>
    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username / Email</label>
        <input type="text" id="username" name="username" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <div id="loginMessage" class="login-message"></div>
      <button type="submit" class="login-btn">Login</button>
    </form>
    <div class="extra-links">
      <a href="#">Forgot Password?</a> | <a href="reg.html">Register</a>
    </div>
  </div>
  <script>
    const loginForm = document.getElementById('loginForm');
    const loginMessage = document.getElementById('loginMessage');

    loginForm.addEventListener('submit', async (event) => {
      event.preventDefault();

      const formData = new FormData(loginForm);
      const payload = new URLSearchParams();
      formData.forEach((value, key) => payload.append(key, value));

      try {
        const response = await fetch('/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
          },
          body: payload
        });

        if (response.ok) {
          window.location.href = '/static/dashboard.html';
          return;
        }

        const result = await response.json();
        loginMessage.textContent = result.detail || 'Login failed. Please try again.';
        loginMessage.style.color = 'red';
      } catch (error) {
        loginMessage.textContent = 'Unable to connect to the backend.';
        loginMessage.style.color = 'red';
      }
    });
  </script>
</body>
</html>

<header class="header-bar" aria-label="Page header">
  <div>
    <h1 class="page-title" id="page-title"></h1>
    <p class="small-text" id="page-subtitle">Manage your database migrations with confidence.</p>
  </div>
  <div class="button-group" style="display:flex; gap:12px; align-items:center;">
    <button id="theme-toggle" class="button-secondary" aria-label="Toggle dark light mode">Theme</button>
    <button id="mobile-menu-button" class="button-secondary" aria-label="Open mobile menu">Menu</button>
    <div class="profile-dropdown" style="position:relative;">
      <button id="profile-button" class="button-secondary" aria-haspopup="true" aria-expanded="false">
        Profile
      </button>
      <div id="profile-menu" class="card" style="position:absolute; right:0; top:calc(100% + 8px); width:220px; display:none;">
        <div style="padding:18px;">
          <p class="profile-name" style="margin:0; font-weight:700;"></p>
          <p class="profile-role small-text" style="margin:6px 0 0;"></p>
        </div>
        <div style="border-top:1px solid rgba(255,255,255,0.08);"></div>
        <a href="../pages/settings.html" class="button-secondary" style="width:100%; margin:12px 0; display:inline-flex; justify-content:center;">Settings</a>
        <a href="#" id="logout-link" class="button-secondary" style="width:100%; display:inline-flex; justify-content:center;">Logout</a>
      </div>
    </div>
  </div>
</header>
<script>
  document.addEventListener('click', (event) => {
    const profileButton = document.getElementById('profile-button');
    const profileMenu = document.getElementById('profile-menu');
    if (profileButton && profileMenu) {
      if (profileButton.contains(event.target)) {
        profileMenu.style.display = profileMenu.style.display === 'block' ? 'none' : 'block';
      } else if (!profileMenu.contains(event.target)) {
        profileMenu.style.display = 'none';
      }
    }
  });
</script>
